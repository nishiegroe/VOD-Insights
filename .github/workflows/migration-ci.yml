name: Migration CI

on:
  pull_request:
  push:
    branches:
      - De-monolithing

jobs:
  python-coverage-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install targeted test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov diff-cover numpy flask

      - name: Run backend tests with coverage gate
        run: |
          python -m pytest tests/backend -q \
            --cov=app.clip_range \
            --cov=app.session_data \
            --cov=app.dependency_bootstrap_ops \
            --cov=app.vod_download_utils \
            --cov=app.split_export \
            --cov=app.webui_app_shell \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=67

      - name: Enforce diff coverage on PR changes
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main:origin/main
          diff-cover coverage.xml --compare-branch=origin/main --fail-under=67

      - name: Run service smoke tests
        run: |
          python -m pytest tests/backend/services/test_detector.py tests/backend/services/test_capture_frame_source.py -q

  node-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python for diff coverage
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install diff-cover
        run: |
          python -m pip install --upgrade pip
          python -m pip install diff-cover

      - name: Install root deps
        run: npm ci

      - name: Install desktop deps
        run: npm --prefix desktop ci

      - name: Run desktop updater policy tests
        run: npm --prefix desktop test

      - name: Run build/security preflight
        run: npm run check:build-security

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Run frontend unit tests with coverage gate
        run: npm --prefix frontend run test:coverage

      - name: Enforce frontend diff coverage on PR changes
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main:origin/main
          diff-cover frontend/coverage/cobertura-coverage.xml --compare-branch=origin/main --fail-under=67 --include="frontend/src/*"

      - name: Build frontend
        run: npm --prefix frontend run build
